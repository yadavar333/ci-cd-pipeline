name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-service-a:
    name: pytest — service-a
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/service-a
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  test-service-b:
    name: Jest — service-b
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/service-b
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/service-b/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
