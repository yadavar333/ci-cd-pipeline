name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-service-a:
    name: pytest — service-a
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/service-a
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  test-service-b:
    name: Jest — service-b
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/service-b
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/service-b/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [test-service-a, test-service-b]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      sha: ${{ steps.tags.outputs.SHA }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tags
        id: tags
        run: echo "SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & push service-a
        uses: docker/build-push-action@v5
        with:
          context: ./services/service-a
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/service-a:${{ steps.tags.outputs.SHA }}
            ${{ secrets.DOCKER_USERNAME }}/service-a:latest

      - name: Build & push service-b
        uses: docker/build-push-action@v5
        with:
          context: ./services/service-b
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/service-b:${{ steps.tags.outputs.SHA }}
            ${{ secrets.DOCKER_USERNAME }}/service-b:latest

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script:   |
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export IMAGE_TAG=${{ needs.build-and-push.outputs.sha }}
            bash ~/deploy.sh

  notify:
    name: Slack notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "*CI/CD Pipeline*: ${{ needs.deploy.result == 'success' && '✅ Deployment succeeded' || '❌ Deployment failed' }}",
              "attachments": [{
                "color": "${{ needs.deploy.result == 'success' && 'good' || 'danger' }}",
                "fields": [
                  { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                  { "title": "Branch",     "value": "${{ github.ref_name }}",   "short": true },
                  { "title": "Commit",     "value": "${{ github.sha }}",        "short": true },
                  { "title": "Author",     "value": "${{ github.actor }}",      "short": true }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
